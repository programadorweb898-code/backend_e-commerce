name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          NODE_ENV: test
          STRIPE_SECRET_KEY: sk_test_dummy
          JWT_SECRET: jwt_test_secret
          JWT_REFRESHTOKEN: jwt_test_refresh_secret
          CLIENT_URL: http://localhost:3000
